<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="800" fill="#1a1a1a"/>
  
  <!-- Title -->
  <text x="640" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#e0e0e0">
    Verification Pipeline
  </text>
  
  <!-- Stage 1: Input -->
  <g>
    <rect x="50" y="100" width="180" height="140" rx="8" fill="#0d47a1" stroke="#64b5f6" stroke-width="2"/>
    <text x="140" y="130" font-size="14" font-weight="bold" text-anchor="middle" fill="#64b5f6">
      Generated Answer
    </text>
    <text x="140" y="155" font-size="12" text-anchor="middle" fill="#b3e5fc">
      "The answer is X"
    </text>
    <text x="140" y="175" font-size="11" text-anchor="middle" fill="#90caf9">
      Raw LLM output
    </text>
    <text x="140" y="210" font-size="11" text-anchor="middle" fill="#64b5f6" font-weight="500">
      Input
    </text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 230 170 L 290 170" stroke="#aaa" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 2: Claim Decomposition -->
  <g>
    <rect x="290" y="100" width="180" height="140" rx="8" fill="#4a148c" stroke="#ce93d8" stroke-width="2"/>
    <text x="380" y="130" font-size="14" font-weight="bold" text-anchor="middle" fill="#ce93d8">
      Claim Decomposition
    </text>
    <text x="380" y="155" font-size="11" text-anchor="middle" fill="#e1bee7">
      Break into atomic
    </text>
    <text x="380" y="170" font-size="11" text-anchor="middle" fill="#e1bee7">
      claims
    </text>
    <circle cx="380" cy="190" r="3" fill="#ce93d8"/>
    <circle cx="390" cy="195" r="3" fill="#ce93d8"/>
    <circle cx="400" cy="190" r="3" fill="#ce93d8"/>
    <text x="380" y="210" font-size="11" text-anchor="middle" fill="#ce93d8" font-weight="500">
      Processing
    </text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 470 170 L 530 170" stroke="#aaa" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 3: NLI Entailment -->
  <g>
    <rect x="530" y="100" width="180" height="140" rx="8" fill="#004d40" stroke="#4db8a8" stroke-width="2"/>
    <text x="620" y="130" font-size="14" font-weight="bold" text-anchor="middle" fill="#4db8a8">
      NLI Entailment
    </text>
    <text x="620" y="155" font-size="11" text-anchor="middle" fill="#80cbc4">
      Check claim support
    </text>
    <text x="620" y="170" font-size="11" text-anchor="middle" fill="#80cbc4">
      against evidence
    </text>
    <text x="620" y="190" font-size="10" text-anchor="middle" fill="#4db8a8" font-weight="500">
      Entail / Neutral / Contradict
    </text>
    <text x="620" y="210" font-size="11" text-anchor="middle" fill="#4db8a8" font-weight="500">
      Validation
    </text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 710 170 L 770 170" stroke="#aaa" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 4: Confidence Scoring -->
  <g>
    <rect x="770" y="100" width="180" height="140" rx="8" fill="#880e4f" stroke="#f48fb1" stroke-width="2"/>
    <text x="860" y="130" font-size="14" font-weight="bold" text-anchor="middle" fill="#f48fb1">
      Confidence Scoring
    </text>
    <text x="860" y="155" font-size="11" text-anchor="middle" fill="#f8bbd0">
      Calculate support
    </text>
    <text x="860" y="170" font-size="11" text-anchor="middle" fill="#f8bbd0">
      ratio per claim
    </text>
    <text x="860" y="190" font-size="10" text-anchor="middle" fill="#f48fb1" font-weight="500">
      Score: 0.0 - 1.0
    </text>
    <text x="860" y="210" font-size="11" text-anchor="middle" fill="#f48fb1" font-weight="500">
      Scoring
    </text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 950 170 L 1010 170" stroke="#aaa" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 5: Output Decision -->
  <g>
    <rect x="1010" y="100" width="220" height="140" rx="8" fill="#e65100" stroke="#ffb74d" stroke-width="2"/>
    <text x="1120" y="130" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffb74d">
      Output Decision
    </text>
    <text x="1120" y="155" font-size="11" text-anchor="middle" fill="#ffe0b2">
      High confidence:
    </text>
    <text x="1120" y="170" font-size="10" text-anchor="middle" fill="#ffe0b2">
      Return answer with citations
    </text>
    <text x="1120" y="190" font-size="11" text-anchor="middle" fill="#ffe0b2">
      Low confidence: Refusal
    </text>
    <text x="1120" y="210" font-size="11" text-anchor="middle" fill="#ffb74d" font-weight="500">
      Output
    </text>
  </g>
  
  <!-- Evidence Box -->
  <g>
    <rect x="50" y="320" width="1180" height="120" rx="8" fill="#1a1a1a" stroke="#64b5f6" stroke-width="2" stroke-dasharray="4"/>
    <text x="70" y="345" font-size="13" font-weight="bold" fill="#64b5f6">
      Retrieved Evidence
    </text>
    <rect x="70" y="355" width="350" height="70" rx="4" fill="#2a2a2a" stroke="#64b5f6" stroke-width="1"/>
    <text x="80" y="377" font-size="11" text-anchor="start" fill="#b3e5fc" font-family="monospace">
      Vector Search Results
    </text>
    <text x="80" y="393" font-size="10" text-anchor="start" fill="#90caf9" font-family="monospace">
      "Context passage 1..."
    </text>
    <text x="80" y="409" font-size="10" text-anchor="start" fill="#90caf9" font-family="monospace">
      "Context passage 2..."
    </text>
    
    <rect x="440" y="355" width="350" height="70" rx="4" fill="#2a2a2a" stroke="#64b5f6" stroke-width="1"/>
    <text x="450" y="377" font-size="11" text-anchor="start" fill="#b3e5fc" font-family="monospace">
      Graph Relations
    </text>
    <text x="450" y="393" font-size="10" text-anchor="start" fill="#90caf9" font-family="monospace">
      Entity A → relates_to → Entity B
    </text>
    <text x="450" y="409" font-size="10" text-anchor="start" fill="#90caf9" font-family="monospace">
      Entity C → has_property → Value
    </text>
    
    <rect x="810" y="355" width="400" height="70" rx="4" fill="#2a2a2a" stroke="#64b5f6" stroke-width="1"/>
    <text x="820" y="377" font-size="11" text-anchor="start" fill="#b3e5fc" font-family="monospace">
      Source Provenance
    </text>
    <text x="820" y="393" font-size="10" text-anchor="start" fill="#90caf9" font-family="monospace">
      Document: doc_1.pdf (Page 5)
    </text>
    <text x="820" y="409" font-size="10" text-anchor="start" fill="#90caf9" font-family="monospace">
      Confidence: Original source quality
    </text>
  </g>
  
  <!-- Refusal Mechanism -->
  <g>
    <rect x="50" y="520" width="1180" height="200" rx="8" fill="#330000" stroke="#ff6b6b" stroke-width="2"/>
    <text x="70" y="550" font-size="13" font-weight="bold" fill="#ff6b6b">
      Refusal Mechanism (Low Confidence Trigger)
    </text>
    
    <!-- Threshold visualization -->
    <g>
      <text x="70" y="580" font-size="11" font-weight="600" fill="#e0e0e0">
        Confidence Threshold Analysis:
      </text>
      
      <!-- Bar 1: Low confidence -->
      <rect x="70" y="600" width="250" height="25" rx="4" fill="#3d0000" stroke="#ff6b6b" stroke-width="1"/>
      <rect x="70" y="600" width="75" height="25" rx="4" fill="#ff6b6b"/>
      <text x="80" y="618" font-size="10" font-weight="bold" fill="#1a1a1a">
        30% Confidence
      </text>
      <text x="330" y="618" font-size="10" fill="#ff6b6b" font-weight="600">
        → REFUSAL
      </text>
      
      <!-- Bar 2: Medium confidence -->
      <rect x="70" y="635" width="250" height="25" rx="4" fill="#3d2200" stroke="#ffb74d" stroke-width="1"/>
      <rect x="70" y="635" width="150" height="25" rx="4" fill="#ffb74d"/>
      <text x="80" y="653" font-size="10" font-weight="bold" fill="#1a1a1a">
        60% Confidence
      </text>
      <text x="330" y="653" font-size="10" fill="#ffb74d" font-weight="600">
        → FLAG FOR REVIEW
      </text>
      
      <!-- Bar 3: High confidence -->
      <rect x="70" y="670" width="250" height="25" rx="4" fill="#003300" stroke="#81c784" stroke-width="1"/>
      <rect x="70" y="670" width="225" height="25" rx="4" fill="#81c784"/>
      <text x="80" y="688" font-size="10" font-weight="bold" fill="#1a1a1a">
        90% Confidence
      </text>
      <text x="330" y="688" font-size="10" fill="#81c784" font-weight="600">
        → RETURN WITH CITATIONS
      </text>
    </g>
    
    <!-- Right side: Refusal response -->
    <g>
      <rect x="620" y="600" width="600" height="100" rx="4" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="1"/>
      <text x="630" y="623" font-size="11" font-weight="bold" fill="#ff6b6b">
        Refusal Response (when confidence &lt; threshold):
      </text>
      <text x="630" y="643" font-size="10" fill="#b3e5fc" font-family="monospace">
        "I cannot provide a confident answer to this question
      </text>
      <text x="630" y="658" font-size="10" fill="#b3e5fc" font-family="monospace">
        based on the available evidence. The retrieved information
      </text>
      <text x="630" y="673" font-size="10" fill="#b3e5fc" font-family="monospace">
        does not sufficiently support a reliable response."
      </text>
    </g>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#aaa"/>
    </marker>
  </defs>
</svg>