    <path d="M302 641H340" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
    <path d="M566 641H604" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
    <path d="M830 641H868" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
    <path d="M1094 641H1132" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>

    <text x="88" y="744" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">
      Includes health checks, chat history persistence, diagnostics, and reproducible experiment scripts.
    </text>
