    <rect x="88" y="240" width="240" height="46" rx="12" fill="#1E293B" stroke="#475569"/>
    <text x="104" y="270" fill="#93C5FD" font-family="JetBrains Mono, Consolas, monospace" font-size="19">GET /health</text>

    <rect x="344" y="240" width="280" height="46" rx="12" fill="#1E293B" stroke="#475569"/>
    <text x="360" y="270" fill="#86EFAC" font-family="JetBrains Mono, Consolas, monospace" font-size="19">POST /upload</text>

    <rect x="88" y="304" width="536" height="46" rx="12" fill="#1E293B" stroke="#475569"/>
    <text x="104" y="334" fill="#FCA5A5" font-family="JetBrains Mono, Consolas, monospace" font-size="19">POST /chat/ask  { mode: hybrid | rag_only | kg_only }</text>

