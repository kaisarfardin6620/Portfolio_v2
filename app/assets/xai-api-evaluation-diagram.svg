    <text x="380" y="398" fill="#FCD34D" font-family="JetBrains Mono, Consolas, monospace" font-size="19">GET /chat/history</text>

    <rect x="88" y="430" width="232" height="38" rx="19" fill="url(#pill)"/>
    <text x="112" y="455" fill="#052E16" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Typed Schemas + Validation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="706" y="170" width="638" height="320" rx="20" fill="url(#card)" stroke="#334155"/>
    <text x="738" y="214" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Evaluation &amp; Benchmark Stack</text>

    <rect x="738" y="240" width="270" height="46" rx="12" fill="#1E293B" stroke="#475569"/>
    <text x="756" y="270" fill="#93C5FD" font-family="JetBrains Mono, Consolas, monospace" font-size="19">benchmark_automation.py</text>

    <rect x="1024" y="240" width="288" height="46" rx="12" fill="#1E293B" stroke="#475569"/>
    <text x="1042" y="270" fill="#86EFAC" font-family="JetBrains Mono, Consolas, monospace" font-size="19">evaluate.py</text>

    <rect x="738" y="304" width="270" height="46" rx="12" fill="#1E293B" stroke="#475569"/>
    <text x="756" y="334" fill="#FCA5A5" font-family="JetBrains Mono, Consolas, monospace" font-size="19">debug_system.py</text>

