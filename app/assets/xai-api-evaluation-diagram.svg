    <text x="372" y="638" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Retrieve</text>
    <text x="372" y="662" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">Pinecone + Neo4j</text>

    <rect x="616" y="604" width="214" height="74" rx="14" fill="#0F172A" stroke="#334155"/>
    <text x="636" y="638" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Generate</text>
    <text x="636" y="662" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">Cited Answer</text>

    <rect x="880" y="604" width="214" height="74" rx="14" fill="#0F172A" stroke="#334155"/>
    <text x="900" y="638" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Verify</text>
    <text x="900" y="662" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">Claim-level NLI</text>

    <rect x="1144" y="604" width="168" height="74" rx="14" fill="#0F172A" stroke="#334155"/>
    <text x="1162" y="638" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Report</text>
