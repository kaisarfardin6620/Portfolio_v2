<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#101A2E"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="420" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D2A44"/>
      <stop offset="1" stop-color="#152238"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="200" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="1100" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="920" rx="32" fill="url(#bg)"/>

  <text x="56" y="86" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700">
    API Surface &amp; Evaluation Tooling
  </text>
  <text x="56" y="126" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500">
    FastAPI endpoints, reproducibility scripts, and benchmark diagnostics
  </text>

  <g filter="url(#shadow)">
