  <rect width="1400" height="900" rx="28" fill="url(#bg)"/>
  <text x="60" y="92" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700">Production Engineering</text>
  <text x="60" y="132" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="22">FastAPI service contracts, persistence, reliability, and observability</text>

  <rect x="60" y="180" width="390" height="170" rx="18" fill="url(#card)" stroke="#334155"/>
